{% load static %}
<!DOCTYPE html>
<html lang="ja">

    <head>

        <meta charset="UTF-8">
        <title>To Do Application</title>
        <meta name="author" content="INIAD">
        <link rel="stylesheet" href="{% static 'todo/styles.css' %}">
    </head>
    <body>
        <div class="page">
            <div class="app-shell">
                <h1>Edit task</h1>
                <p>You can edit tasks from the following form.</p>
                <form class="form-card" action="{% url 'update' task.id %}" method="post">
                    {% csrf_token %}

                    <div>
                        <label for="titleInput">Title</label><br>
                        <input
                            id="titleInput"
                            name="title"
                            type="text"
                            placeholder="Input title"
                            value="{{ task.title }}">
                    </div>

                    <div>
                        <label for="categoryInput">Category</label><br>
                        <select id="categoryInput" name="category">
                            <option value="" {% if not task.category %}selected{% endif %}>Uncategorized</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}" {% if task.category and task.category.id == category.id %}selected{% endif %}>{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label for="dueInput">Due at:</label><br>
                        <input
                            id="dueInput"
                            name="due_at"
                            type="datetime-local"
                            value="{{ task.due_at|date:'Y-m-d\TH:i' }}">
                    </div>

                    <div>
                        <label for="prioritySelect">Priority</label><br>
                        <select id="prioritySelect" name="priority">
                            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>低</option>
                            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>中</option>
                            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>高</option>
                        </select>
                    </div>

                    <div>
                        <button type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
